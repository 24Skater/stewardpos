<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="500" viewBox="0 0 1600 500" fill="none">
  <defs>
    <linearGradient id="shieldGrad" x1="90" y1="40" x2="410" y2="460" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4B3F8F"></stop>
      <stop offset="0.55" stop-color="#3B6FD8"></stop>
      <stop offset="1" stop-color="#2A2F3A"></stop>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F5B942"></stop>
      <stop offset="1" stop-color="#D39A2F"></stop>
    </linearGradient>
  </defs>

  <!-- Background (optional): remove if you place SVG over your own background -->
  <rect x="0" y="0" width="1600" height="500" fill="#0F1115"></rect>

  <!-- Icon -->
  <g transform="translate(70,40)">
    <path d="M250 20
             C205 52 150 62 118 70
             V220
             C118 330 180 418 250 460
             C320 418 382 330 382 220
             V70
             C350 62 295 52 250 20 Z" fill="url(#shieldGrad)"></path>

    <path d="M185 70
             C185 64 190 59 196 59
             H304
             C310 59 315 64 315 70
             V136
             L304 128 L293 136 L282 128 L271 136 L260 128 L250 136
             L240 128 L229 136 L218 128 L207 136 L196 128 L185 136
             V70 Z" fill="url(#goldGrad)"></path>

    <!-- Receipt cross -->
    <rect x="244" y="74" width="12" height="44" rx="4" fill="#FFFFFF"></rect>
    <rect x="230" y="88" width="40" height="12" rx="4" fill="#FFFFFF"></rect>

    <!-- Terminal -->
    <path d="M170 150
             C170 139 179 130 190 130
             H310
             C321 130 330 139 330 150
             V330
             C330 341 321 350 310 350
             H190
             C179 350 170 341 170 330
             V150 Z" fill="#FFFFFF" opacity="0.12"></path>

    <rect x="198" y="160" width="104" height="86" rx="14" fill="#3B6FD8" opacity="0.92"></rect>

    <!-- Screen cross -->
    <rect x="246" y="174" width="10" height="52" rx="4" fill="#FFFFFF"></rect>
    <rect x="228" y="192" width="46" height="10" rx="4" fill="#FFFFFF"></rect>

    <!-- Keypad -->
    <g opacity="0.9" fill="#3B6FD8">
      <rect x="198" y="262" width="34" height="26" rx="7"></rect>
      <rect x="236" y="262" width="34" height="26" rx="7"></rect>
      <rect x="274" y="262" width="34" height="26" rx="7"></rect>
      <rect x="198" y="292" width="34" height="26" rx="7"></rect>
      <rect x="236" y="292" width="34" height="26" rx="7"></rect>
      <rect x="274" y="292" width="34" height="26" rx="7"></rect>
    </g>
  </g>

  <!-- Wordmark (white) -->
  <text x="520" y="220" font-size="110" font-weight="600" fill="#FFFFFF" font-family="Playfair Display, Georgia, 'Times New Roman', serif">
    StewardPOS
  </text>

  <!-- Tagline -->
  <text x="525" y="290" font-size="42" fill="#E5E7EB" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif">
    Modern Point of Sale System
  </text>

  <!-- Accent line -->
  <rect x="525" y="320" width="620" height="6" rx="3" fill="#F5B942"></rect>
</svg>
