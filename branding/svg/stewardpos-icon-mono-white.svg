    <rect x="494" y="560" width="56" height="44" rx="10"></rect>
    <rect x="558" y="560" width="56" height="44" rx="10"></rect>

    <rect x="430" y="612" width="56" height="44" rx="10"></rect>
    <rect x="494" y="612" width="56" height="44" rx="10"></rect>
    <rect x="558" y="612" width="56" height="44" rx="10"></rect>

    <rect x="430" y="664" width="56" height="44" rx="10"></rect>
    <rect x="494" y="664" width="56" height="44" rx="10"></rect>
    <rect x="558" y="664" width="56" height="44" rx="10"></rect>
