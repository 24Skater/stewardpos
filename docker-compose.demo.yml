# Demo/Development Docker Compose Configuration
# This is a simplified setup for quick demos and local development
# For production deployments, use the environment-specific configurations in environments/

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: stewardpos-db-demo
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stewardpos}
      POSTGRES_USER: ${POSTGRES_USER:-stewardpos_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-demo_password_123}
    volumes:
      - postgres_data_demo:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stewardpos_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stewardpos-demo-network

  # MinIO (S3-compatible storage)
  minio:
    image: minio/minio:latest
    container_name: stewardpos-storage-demo
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data_demo:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - stewardpos-demo-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stewardpos-backend-demo
    restart: unless-stopped
    environment:
      # Server
      NODE_ENV: production
      PORT: 3001
      HOST: 0.0.0.0
      
      # Database
      DB_ADAPTER: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-stewardpos}
      DB_USER: ${DB_USER:-stewardpos_user}
      DB_PASSWORD: ${DB_PASSWORD:-demo_password_123}
      
      # JWT
      JWT_SECRET: ${JWT_SECRET:-demo_jwt_secret_min_32_characters_long_change_me}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      
      # CORS
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080,http://localhost:3001}
      
      # Rate Limiting
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-100}
      
      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FILE: /app/logs/app.log
      
      # Auto-seed database on first startup (useful for demos)
      AUTO_SEED: ${AUTO_SEED:-true}
    volumes:
      - backend_logs_demo:/app/logs
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - stewardpos-demo-network

  # Frontend Application
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3001}
    container_name: stewardpos-frontend-demo
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      # API Configuration
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:3001}
      
      # Features
      - VITE_APP_ENV=demo
    depends_on:
      backend:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - stewardpos-demo-network

volumes:
  postgres_data_demo:
    driver: local
  minio_data_demo:
    driver: local
  backend_logs_demo:
    driver: local

networks:
  stewardpos-demo-network:
    driver: bridge

