version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: persona-pos-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: persona_pos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO (S3-compatible storage)
  minio:
    image: minio/minio:latest
    container_name: persona-pos-storage
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stewardpos-backend
    restart: unless-stopped
    environment:
      # Server
      NODE_ENV: production
      PORT: 3001
      HOST: 0.0.0.0
      
      # Database
      DB_ADAPTER: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-persona_pos}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      
      # JWT
      JWT_SECRET: ${JWT_SECRET:-CHANGE_THIS_MIN_32_CHARACTERS_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      
      # CORS
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost,http://localhost:8080}
      
      # Rate Limiting
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-100}
      
      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FILE: /app/logs/app.log
    volumes:
      - backend_logs:/app/logs
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - stewardpos-network

  # Frontend Application
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stewardpos-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      # API Configuration
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:3001}
      
      # Database (for reference, not used in frontend)
      - VITE_DB_ADAPTER=postgres
      - VITE_DB_HOST=postgres
      - VITE_DB_PORT=5432
      - VITE_DB_NAME=persona_pos
      - VITE_DB_USER=postgres
      - VITE_DB_PASSWORD=postgres
      
      # Storage
      - VITE_STORAGE_ADAPTER=s3
      - VITE_STORAGE_S3_ENDPOINT=http://minio:9000
      - VITE_STORAGE_S3_REGION=us-east-1
      - VITE_STORAGE_S3_BUCKET=assets
      - VITE_STORAGE_S3_ACCESS_KEY_ID=minioadmin
      - VITE_STORAGE_S3_SECRET_ACCESS_KEY=minioadmin
      
      # Features
      - VITE_FEATURE_STORAGE=true
      - VITE_APP_ENV=production
    depends_on:
      backend:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - stewardpos-network

volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local
  backend_logs:
    driver: local

networks:
  stewardpos-network:
    driver: bridge
