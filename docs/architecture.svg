<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-size="24" font-weight="bold" fill="#1a202c">
    Persona POS Architecture
  </text>
  <text x="400" y="55" text-anchor="middle" font-size="14" fill="#718096">
    Clean Architecture with Ports & Adapters Pattern
  </text>

  <!-- Core/Domain Layer -->
  <rect x="300" y="100" width="200" height="120" rx="8" fill="#4299e1" stroke="#2b6cb0" stroke-width="2"/>
  <text x="400" y="130" text-anchor="middle" font-size="16" font-weight="bold" fill="white">
    Core / Domain
  </text>
  <text x="400" y="155" text-anchor="middle" font-size="12" fill="white">
    Models (Types)
  </text>
  <text x="400" y="175" text-anchor="middle" font-size="12" fill="white">
    Ports (Interfaces)
  </text>
  <text x="320" y="200" font-size="10" fill="white">• DBPort</text>
  <text x="480" y="200" font-size="10" fill="white">• AuthPort</text>

  <!-- Adapters Layer -->
  <g id="adapters">
    <!-- Database Adapters -->
    <rect x="50" y="280" width="140" height="100" rx="6" fill="#48bb78" stroke="#2f855a" stroke-width="2"/>
    <text x="120" y="305" text-anchor="middle" font-size="14" font-weight="bold" fill="white">
      DB Adapters
    </text>
    <text x="120" y="330" text-anchor="middle" font-size="10" fill="white">IndexedDB</text>
    <text x="120" y="350" text-anchor="middle" font-size="10" fill="white">PostgreSQL</text>
    <text x="120" y="370" text-anchor="middle" font-size="10" fill="white">SQLite</text>

    <!-- Auth Adapters -->
    <rect x="210" y="280" width="140" height="100" rx="6" fill="#48bb78" stroke="#2f855a" stroke-width="2"/>
    <text x="280" y="305" text-anchor="middle" font-size="14" font-weight="bold" fill="white">
      Auth Adapters
    </text>
    <text x="280" y="330" text-anchor="middle" font-size="10" fill="white">Local (bcrypt)</text>
    <text x="280" y="350" text-anchor="middle" font-size="10" fill="white">Google OAuth</text>
    <text x="280" y="370" text-anchor="middle" font-size="10" fill="white">OIDC</text>

    <!-- Email Adapters -->
    <rect x="370" y="280" width="140" height="100" rx="6" fill="#48bb78" stroke="#2f855a" stroke-width="2"/>
    <text x="440" y="305" text-anchor="middle" font-size="14" font-weight="bold" fill="white">
      Email Adapters
    </text>
    <text x="440" y="330" text-anchor="middle" font-size="10" fill="white">Console</text>
    <text x="440" y="350" text-anchor="middle" font-size="10" fill="white">SMTP</text>
    <text x="440" y="370" text-anchor="middle" font-size="10" fill="white">Resend</text>

    <!-- Storage Adapters -->
    <rect x="530" y="280" width="140" height="100" rx="6" fill="#48bb78" stroke="#2f855a" stroke-width="2"/>
    <text x="600" y="305" text-anchor="middle" font-size="14" font-weight="bold" fill="white">
      Storage Adapters
    </text>
    <text x="600" y="330" text-anchor="middle" font-size="10" fill="white">LocalStorage</text>
    <text x="600" y="350" text-anchor="middle" font-size="10" fill="white">S3 / MinIO</text>
    <text x="600" y="370" text-anchor="middle" font-size="10" fill="white">Azure Blob</text>
  </g>

  <!-- DI Container -->
  <rect x="300" y="420" width="200" height="80" rx="8" fill="#ed8936" stroke="#c05621" stroke-width="2"/>
  <text x="400" y="445" text-anchor="middle" font-size="16" font-weight="bold" fill="white">
    DI Container
  </text>
  <text x="400" y="470" text-anchor="middle" font-size="12" fill="white">
    Configuration + Wiring
  </text>
  <text x="400" y="490" text-anchor="middle" font-size="10" fill="white">
    (config.yml + env vars)
  </text>

  <!-- Application Layer -->
  <rect x="250" y="530" width="300" height="60" rx="8" fill="#9f7aea" stroke="#6b46c1" stroke-width="2"/>
  <text x="400" y="555" text-anchor="middle" font-size="16" font-weight="bold" fill="white">
    Application / UI
  </text>
  <text x="400" y="575" text-anchor="middle" font-size="12" fill="white">
    React Components • Routes • Pages
  </text>

  <!-- Arrows -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#2d3748"/>
    </marker>
  </defs>

  <!-- Core to Adapters arrows -->
  <line x1="320" y1="220" x2="120" y2="280" stroke="#2d3748" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="360" y1="220" x2="280" y2="280" stroke="#2d3748" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="440" y1="220" x2="440" y2="280" stroke="#2d3748" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="480" y1="220" x2="600" y2="280" stroke="#2d3748" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Adapters to DI arrows -->
  <line x1="120" y1="380" x2="320" y2="440" stroke="#2d3748" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="280" y1="380" x2="360" y2="440" stroke="#2d3748" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="440" y1="380" x2="400" y2="420" stroke="#2d3748" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="600" y1="380" x2="480" y2="440" stroke="#2d3748" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- DI to App arrow -->
  <line x1="400" y1="500" x2="400" y2="530" stroke="#2d3748" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Legend -->
  <text x="50" y="80" font-size="12" font-weight="bold" fill="#2d3748">Legend:</text>
  <rect x="50" y="85" width="40" height="15" rx="2" fill="#4299e1"/>
  <text x="95" y="96" font-size="10" fill="#2d3748">Core (domain logic)</text>
  <rect x="220" y="85" width="40" height="15" rx="2" fill="#48bb78"/>
  <text x="265" y="96" font-size="10" fill="#2d3748">Adapters (swappable)</text>
  <rect x="390" y="85" width="40" height="15" rx="2" fill="#ed8936"/>
  <text x="435" y="96" font-size="10" fill="#2d3748">Infrastructure (DI)</text>
  <rect x="560" y="85" width="40" height="15" rx="2" fill="#9f7aea"/>
  <text x="605" y="96" font-size="10" fill="#2d3748">UI (React)</text>
</svg>
