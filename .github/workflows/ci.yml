name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run test:coverage
        continue-on-error: true

  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: stewardpos_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - working-directory: ./backend
        run: npm ci
      - working-directory: ./backend
        run: npm run migrate
        env:
          DB_ADAPTER: postgres
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: stewardpos_test
          DB_USER: postgres
          DB_PASSWORD: postgres
          JWT_SECRET: test-secret-min-32-characters-long-for-ci
      - working-directory: ./backend
        run: npm run test:coverage
        continue-on-error: true
        env:
          DB_ADAPTER: postgres
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: stewardpos_test
          DB_USER: postgres
          DB_PASSWORD: postgres
          JWT_SECRET: test-secret-min-32-characters-long-for-ci

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - working-directory: ./backend
        run: npm ci
      - working-directory: ./backend
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - name: Start backend
        working-directory: ./backend
        run: |
          npm ci
          DB_ADAPTER=sqlite JWT_SECRET=test-secret-min-32-characters-long-for-ci node dist/index.js &
          sleep 5
        continue-on-error: true
      - name: Build and preview frontend
        run: |
          npm run build
          npx vite preview --port 8081 &
          sleep 3
      - name: Run Playwright E2E tests
        run: npm run test:e2e
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm audit --audit-level=moderate
        continue-on-error: true
      - working-directory: ./backend
        run: npm ci
      - working-directory: ./backend
        run: npm audit --audit-level=moderate
        continue-on-error: true
